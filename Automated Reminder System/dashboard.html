<!DOCTYPE html>
<html lang="en">
<head>
   <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automatic eMail Reminder</title>

    <!-- Correct Flask URL for CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

</head>
<body>

    <div class="container">
        <h1>Automatic eMail Reminder</h1>

        <form id="reminderForm">
            <div class="form-group">
                <label for="title">Title:</label>
                <input type="text" id="title" name="title" required>
            </div>

            <div class="form-group">
                <label for="description">Description:</label>
                <textarea id="description" name="description"></textarea>
            </div>

            <div class="form-group">
                <label for="date">Date:</label>
                <input type="date" id="date" name="date" required>
            </div>

            <div class="form-group">
                <label for="time">Time:</label>
                <input type="time" id="time" name="time" required>
            </div>

            <div class="form-group notification-section">
                <label for="deliveryMethod">🔔 Choose Delivery Method:</label>
                <select id="deliveryMethod" name="deliveryMethod">
                    <option value="Email">Email (Default)</option>
                    <option value="SMS">SMS Text</option>
                    <option value="WhatsApp">WhatsApp SMS</option>
                    <option value="Call">Automated Call</option>
                </select>
            </div>

            <button type="submit">Create Reminder</button>
        </form>
    </div>

    
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js"></script>


<script src="/static/script.js"></script>   <!-- Your existing JS -->

</body>
</html>
