name: Project Operations Manager CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          pip install -r Project-Operations-Manager/requirements.txt

      - name: Check Python Syntax
        run: |
          python -m py_compile Project-Operations-Manager/backend/app.py

      - name: Build Docker Image
        run: |
          docker build .
